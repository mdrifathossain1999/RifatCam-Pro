name: Build RifatCam Pro iOS

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install XcodeGen & Generate project
        run: |
          brew install xcodegen
          xcodegen --spec project-ci.yml --project .

      - name: Build unsigned .app
        run: |
          xcodebuild \
            -project RifatCamPro.xcodeproj \
            -scheme RifatCamPro \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Prepare .app for sideloading
        run: |
          APP_PATH=$(find build -name "*.app" -type d -maxdepth 5 2>/dev/null | head -1)
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: .app not found!"
            find build -type d -maxdepth 8 2>/dev/null
            exit 1
          fi
          echo "Found .app at: $APP_PATH"
          rm -fv "$APP_PATH/RifatCamPro.debug.dylib" 2>/dev/null
          rm -fv "$APP_PATH/__preview.dylib" 2>/dev/null
          codesign -f -s - "$APP_PATH" 2>&1 || echo "codesign warning (non-fatal)"
          echo "Final .app contents:"
          ls -la "$APP_PATH/"

      - name: Create IPA
        run: |
          APP_PATH=$(find build -name "*.app" -type d -maxdepth 5 2>/dev/null | head -1)
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r RifatCamPro.ipa Payload
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: RifatCamPro-iOS
          path: RifatCamPro.ipa
          compression-level: 9
