name: Build RifatCam Pro iOS

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: |
          # Find available Xcode 16.x
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | head -1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH=$(xcode-select -p | sed 's|/Contents/Developer||')
          fi
          echo "Using: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH"

      - name: Install XcodeGen & Generate project
        run: |
          brew install xcodegen
          xcodegen --spec project-ci.yml --project .

      - name: Build unsigned .app
        run: |
          set +e
          xcodebuild \
            -project RifatCamPro.xcodeproj \
            -scheme RifatCamPro \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            SUPPORTS_MACCATALYST=NO \
            build 2>&1 | tee build.log
          EXIT_CODE=${PIPESTATUS[0]}
          
          # Check if the binary was actually produced despite asset catalog error
          APP_PATH=$(find build -name "*.app" -type d -maxdepth 5 2>/dev/null | head -1)
          if [ -n "$APP_PATH" ] && [ -f "$APP_PATH/RifatCamPro" ]; then
            echo "BUILD SUCCEEDED: Binary found at $APP_PATH/RifatCamPro"
            file "$APP_PATH/RifatCamPro"
            # Continue despite asset catalog error
            exit 0
          fi
          
          echo "BUILD FAILED: No binary produced"
          tail -30 build.log
          exit 1

      - name: Prepare .app for sideloading
        run: |
          APP_PATH=$(find build -name "*.app" -type d -maxdepth 5 2>/dev/null | head -1)
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: .app not found!"
            find build -type d -maxdepth 8 2>/dev/null
            exit 1
          fi
          echo "Found .app at: $APP_PATH"
          
          # Check if binary exists
          if [ ! -f "$APP_PATH/RifatCamPro" ]; then
            echo "ERROR: Binary not found in .app!"
            ls -la "$APP_PATH/"
            exit 1
          fi
          echo "Binary found: $(file "$APP_PATH/RifatCamPro")"
          
          rm -fv "$APP_PATH/RifatCamPro.debug.dylib" 2>/dev/null
          rm -fv "$APP_PATH/__preview.dylib" 2>/dev/null
          codesign -f -s - "$APP_PATH" 2>&1 || echo "codesign warning (non-fatal)"
          echo "Final .app contents:"
          ls -la "$APP_PATH/"

      - name: Create IPA
        run: |
          APP_PATH=$(find build -name "*.app" -type d -maxdepth 5 2>/dev/null | head -1)
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r RifatCamPro.ipa Payload
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: RifatCamPro-iOS
          path: RifatCamPro.ipa
          compression-level: 9
