name: RifatCamPro
options:
  bundleIdPrefix: com.rifatcam
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "16.0"
  generateSceneManifest: false

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_FILE: "ios-app/RifatCamPro/Info.plist"
    DEVELOPMENT_TEAM: ""

targets:
  RifatCamPro:
    type: application
    platform: iOS
    sources:
      - path: ios-app/RifatCamPro
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.rifatcam.pro
      INFOPLIST_FILE: ios-app/RifatCamPro/Info.plist
      ASSETCATALOG_COMPILER_APPICON_NAME: ""
      ENABLE_USER_SCRIPT_SANDBOXING: "NO"
      ENABLE_TESTABILITY: "NO"
      COPY_PHASE_STRIP: "NO"
      STRIP_INSTALLED_PRODUCT: "NO"
      DEAD_CODE_STRIPPING: "NO"
      OTHER_LDFLAGS: ["-ObjC"]
    configs:
      Debug: debug
      Release: release

schemes:
  RifatCamPro:
    build:
      targets:
        RifatCamPro: all
    run:
      config: Debug
    archive:
      config: Release
