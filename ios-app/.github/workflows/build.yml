name: Build RifatCam Pro iOS

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen & Generate project
        run: |
          brew install xcodegen
          xcodegen --spec project-ci.yml --project .

      - name: Build unsigned .app
        run: |
          xcodebuild \
            -project RifatCamPro.xcodeproj \
            -scheme RifatCamPro \
            -sdk iphoneos \
            -configuration debug \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: RifatCamPro-iOS
          path: build/Build/Products/Debug-iphoneos/*.app
          compression-level: 9
