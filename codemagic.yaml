workflows:
  build-ipa:
    name: Build RifatCam Pro IPA
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      vars:
        APP_ID: com.rifatcam.pro
        APP_NAME: RifatCam Pro
        XCODE_SCHEME: RifatCamPro
      xcode: latest
    scripts:
      - name: Generate Xcode project
        script: brew install xcodegen && xcodegen --spec project-ci.yml --project .
      - name: Build unsigned .app
        script: |
          xcodebuild \
            -project RifatCamPro.xcodeproj \
            -scheme RifatCamPro \
            -sdk iphoneos \
            -configuration release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            build
      - name: Strip debug artifacts from .app
        script: |
          APP_PATH=$(ls build/Build/Products/*-iphoneos/*.app 2>/dev/null | head -1)
          if [ -d "$APP_PATH" ]; then
            echo "Stripping debug dylibs from $APP_PATH"
            rm -f "$APP_PATH/RifatCamPro.debug.dylib" 2>/dev/null
            rm -f "$APP_PATH/__preview.dylib" 2>/dev/null
            echo "Remaining files:"
            ls -la "$APP_PATH/"
          else
            echo "Warning: .app not found at expected path"
            find build -name "*.app" -type d
          fi
    artifacts:
      - build/Build/Products/*-iphoneos/*.app
    publishing:
      email:
        recipients:
          - mdrifathossainpersonal@gmail.com
