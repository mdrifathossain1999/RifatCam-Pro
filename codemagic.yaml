workflows:
  build-ipa:
    name: Build RifatCam Pro IPA
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      vars:
        APP_ID: com.rifatcam.pro
        APP_NAME: RifatCam Pro
        XCODE_SCHEME: RifatCamPro
      xcode: 15.4
    scripts:
      - name: Generate Xcode project
        script: brew install xcodegen && xcodegen --spec project-ci.yml --project .
      - name: Build unsigned .app
        script: |
          xcodebuild \
            -project RifatCamPro.xcodeproj \
            -scheme RifatCamPro \
            -sdk iphoneos \
            -configuration release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            build
      - name: Prepare .app for sideloading
        script: |
          APP_PATH=$(find build -name "*.app" -type d -maxdepth 5 2>/dev/null | head -1)
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: .app not found!"
            find build -type d -maxdepth 8 2>/dev/null
            exit 1
          fi
          echo "Found .app at: $APP_PATH"

          # Strip debug dylibs
          rm -fv "$APP_PATH/RifatCamPro.debug.dylib" 2>/dev/null
          rm -fv "$APP_PATH/__preview.dylib" 2>/dev/null

          # Apply ad-hoc code signature (required on iOS 17+)
          echo "Applying ad-hoc code signature..."
          codesign -f -s - "$APP_PATH" 2>&1 || echo "codesign warning (non-fatal)"

          # Verify
          echo "Final .app contents:"
          ls -la "$APP_PATH/"
          echo "Code signature status:"
          codesign -dv "$APP_PATH" 2>&1 || true
    artifacts:
      - build/Build/Products/*-iphoneos/*.app
    publishing:
      email:
        recipients:
          - mdrifathossainpersonal@gmail.com
