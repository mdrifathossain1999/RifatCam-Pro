workflows:
  build-ipa:
    name: Build RifatCam Pro IPA
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      vars:
        APP_ID: com.rifatcam.pro
        APP_NAME: RifatCam Pro
        XCODE_SCHEME: RifatCamPro
      xcode: latest
    scripts:
      - name: Generate Xcode project
        script: brew install xcodegen && xcodegen --spec project-ci.yml --project .
      - name: Build unsigned .app
        script: |
          xcodebuild \
            -project RifatCamPro.xcodeproj \
            -scheme RifatCamPro \
            -sdk iphoneos \
            -configuration release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            build
    artifacts:
      - build/Build/Products/Release-iphoneos/*.app
    publishing:
      email:
        recipients:
          - user@example.com
